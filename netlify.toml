# Netlify build configuration for Pablitos Auto Sales
# This file is read by Netlify when you connect this repo.

[build]
  # No build step — the site is pre-built static HTML/CSS/JS.
  # Netlify just publishes the root directory.
  publish = "."
  command = ""

# Make /admin work without trailing slash
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301
  force = true

# Cache static assets aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# But always re-fetch the inventory data so updates show up immediately
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
